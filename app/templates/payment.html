{% extends 'base.html' %}
{% block title %}Complete Payment | AeroFlow{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="container-neo">
            <i class="bi bi-credit-card-2-front text-primary mb-3" style="font-size: 4rem;"></i>
            <h3 class="fw-bold mb-2">Complete Your Payment</h3>
            <p class="text-muted mb-4">You are about to pay <strong>₹{{ "%.2f"|format(booking.total_price) }}</strong> for your booking to {{ booking.flight.destination }}.</p>
            
            <form action="{{ url_for('user.payment_verify') }}" method="POST">
                <!-- Razorpay Checkout JS -->
                <script
                    src="https://checkout.razorpay.com/v1/checkout.js"
                    data-key="{{ key_id }}"
                    data-amount="{{ order_amount }}"
                    data-currency="INR"
                    data-order_id="{{ booking.order_id }}"
                    data-buttontext="Pay ₹{{ '%.2f'|format(booking.total_price) }} with Razorpay"
                    data-name="AeroFlow Flights"
                    data-description="Flight Booking #{{ booking.id }}"
                    data-image="{{ url_for('static', filename='img/logo.png') }}"
                    data-prefill.name="{{ current_user.name }}"
                    data-prefill.email="{{ current_user.email }}"
                    data-theme.color="#3182ce"
                ></script>
                <input type="hidden" custom="Hidden Element" name="hidden">
            </form>
            
            <!-- Hide the ugly default razorpay button and style it -->
            <style>
                .razorpay-payment-button {
                    background: linear-gradient(135deg, #3182ce, #2b6cb0);
                    color: white;
                    border: none;
                    border-radius: 12px;
                    padding: 15px 30px;
                    font-size: 1.2rem;
                    font-weight: 700;
                    cursor: pointer;
                    box-shadow: 4px 4px 10px rgba(49, 130, 206, 0.4);
                    transition: all 0.3s ease;
                    width: 100%;
                }
                .razorpay-payment-button:hover {
                    transform: translateY(-2px);
                    box-shadow: 6px 6px 15px rgba(49, 130, 206, 0.5);
                }
            </style>

            <div class="mt-4">
                <a href="{{ url_for('user.book', flight_id=booking.flight_id) }}" class="text-muted text-decoration-none hover-text-danger">
                    <i class="bi bi-x-circle me-1"></i> Cancel Payment
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
